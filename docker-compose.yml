# Stack completa para deploy (Portainer ou docker compose)
# Uso: cp .env.example .env && preencha SESSION_SECRET e opcionais → docker compose up -d
# Migrations/seed (uma vez): docker compose run --rm app npx drizzle-kit migrate
#                            docker compose run --rm app npx tsx scripts/db-seed.ts

services:
  postgres:
    # pgvector/pgvector:pg16 inclui extensão pgvector (necessária para Vysen knowledge base).
    # Mesma imagem usada no Swarm — evita drift entre compose dev e prod.
    image: pgvector/pgvector:pg16
    container_name: app-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: vysen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: app-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    image: ghcr.io/gabrielspencerf/observabilidade-saas:latest
    container_name: app-web
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/vysen
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

  worker:
    image: ghcr.io/gabrielspencerf/observabilidade-saas:latest
    container_name: app-worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/vysen
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    command: ["npx", "tsx", "src/workers/runner.ts"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
